<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">RT-DETR R50VD architecture diagram</title>
  <desc id="desc">Paper-style architecture diagram for RT-DETR R50VD showing backbone features S3 S4 S5, AIFI, CCFF, uncertainty-minimal query selection, decoder and prediction heads.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f3f7f1"/>
    </linearGradient>
    <linearGradient id="backbone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="aifi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="fusion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="decoder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9a8d4"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,7 L1,13 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,7 L1,13 Z" fill="#15803d"/>
    </marker>
    <style>
      .title { font: 800 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#0f172a; letter-spacing:0; }
      .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#475569; letter-spacing:0; }
      .label { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#0f172a; letter-spacing:0; }
      .small { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#475569; letter-spacing:0; }
      .tiny { font: 700 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#64748b; letter-spacing:0; }
      .white { font: 800 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#ffffff; letter-spacing:0; }
      .whiteSmall { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#f8fafc; letter-spacing:0; }
      .mono { font: 700 12px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill:#334155; letter-spacing:0; }
      .box { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; filter:url(#shadow); }
      .mini { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.2; }
      .feature { fill:#e0f2fe; stroke:#0284c7; stroke-width:1.5; }
      .query { fill:#fef3c7; stroke:#d97706; stroke-width:1.4; }
      .pos { fill:#ede9fe; stroke:#7c3aed; stroke-width:1.4; }
      .flow { fill:none; stroke:#334155; stroke-width:3; marker-end:url(#arrow); }
      .flowThin { fill:none; stroke:#64748b; stroke-width:2.2; marker-end:url(#arrow); }
      .flowGreen { fill:none; stroke:#15803d; stroke-width:3; marker-end:url(#arrowGreen); }
      .dash { fill:none; stroke:#64748b; stroke-width:2.2; stroke-dasharray:8 7; marker-end:url(#arrow); }
      .groupTitle { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#334155; letter-spacing:0; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="url(#page)"/>
  <text x="72" y="64" class="title">RT-DETR R50VD Architecture</text>
  <text x="72" y="94" class="subtitle">Paper-style view: backbone features -> efficient hybrid encoder -> uncertainty-minimal query selection -> decoder and head</text>

  <rect x="72" y="150" width="180" height="620" rx="8" fill="url(#backbone)" filter="url(#shadow)"/>
  <text x="104" y="190" class="white">Input Image</text>
  <text x="104" y="214" class="whiteSmall">B x 3 x 640 x 640</text>
  <rect x="112" y="255" width="100" height="100" rx="6" fill="#ffffff" opacity="0.9"/>
  <path d="M126 332 L150 300 L170 318 L184 286 L202 332 Z" fill="#38bdf8" opacity="0.8"/>
  <circle cx="142" cy="284" r="12" fill="#fbbf24" opacity="0.9"/>
  <text x="103" y="420" class="white">PResNet-50vd</text>
  <text x="105" y="446" class="whiteSmall">return_idx [1,2,3]</text>
  <text x="105" y="470" class="whiteSmall">pretrained backbone</text>

  <rect x="330" y="180" width="160" height="90" rx="7" class="feature"/>
  <text x="383" y="214" class="label">S3</text>
  <text x="359" y="240" class="small">512 ch, stride 8</text>

  <rect x="330" y="385" width="160" height="90" rx="7" class="feature"/>
  <text x="383" y="419" class="label">S4</text>
  <text x="352" y="445" class="small">1024 ch, stride 16</text>

  <rect x="330" y="590" width="160" height="90" rx="7" class="feature"/>
  <text x="383" y="624" class="label">S5</text>
  <text x="352" y="650" class="small">2048 ch, stride 32</text>

  <path class="flow" d="M252 355 C285 260,290 225,330 225"/>
  <path class="flow" d="M252 420 C286 420,300 430,330 430"/>
  <path class="flow" d="M252 500 C288 585,296 635,330 635"/>

  <rect x="580" y="130" width="575" height="690" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
  <text x="608" y="166" class="groupTitle">Efficient Hybrid Encoder</text>

  <rect x="620" y="190" width="150" height="74" rx="7" class="mini"/>
  <text x="649" y="220" class="label">Proj</text>
  <text x="646" y="244" class="small">1x1 conv</text>

  <rect x="620" y="395" width="150" height="74" rx="7" class="mini"/>
  <text x="649" y="425" class="label">Proj</text>
  <text x="646" y="449" class="small">1x1 conv</text>

  <rect x="620" y="600" width="150" height="74" rx="7" class="mini"/>
  <text x="649" y="630" class="label">Proj</text>
  <text x="646" y="654" class="small">1x1 conv</text>

  <path class="flowThin" d="M490 225 C535 225,565 227,620 227"/>
  <path class="flowThin" d="M490 430 C535 430,565 432,620 432"/>
  <path class="flowThin" d="M490 635 C535 635,565 637,620 637"/>

  <rect x="835" y="570" width="170" height="120" rx="8" fill="url(#aifi)" filter="url(#shadow)"/>
  <text x="878" y="614" class="white">AIFI</text>
  <text x="862" y="638" class="whiteSmall">self-attention</text>
  <text x="867" y="660" class="whiteSmall">only on S5</text>
  <text x="872" y="682" class="whiteSmall">1 layer</text>
  <path class="flow" d="M770 637 C798 637,808 637,835 637"/>

  <rect x="840" y="205" width="130" height="70" rx="7" fill="url(#fusion)" filter="url(#shadow)"/>
  <text x="870" y="234" class="white">Fusion</text>
  <text x="869" y="256" class="whiteSmall">S4 -> S3</text>

  <rect x="840" y="395" width="130" height="70" rx="7" fill="url(#fusion)" filter="url(#shadow)"/>
  <text x="870" y="424" class="white">Fusion</text>
  <text x="869" y="446" class="whiteSmall">S5 -> S4</text>

  <rect x="1015" y="290" width="130" height="70" rx="7" fill="url(#fusion)" filter="url(#shadow)"/>
  <text x="1045" y="319" class="white">Fusion</text>
  <text x="1042" y="341" class="whiteSmall">PAN path</text>

  <rect x="1015" y="500" width="130" height="70" rx="7" fill="url(#fusion)" filter="url(#shadow)"/>
  <text x="1045" y="529" class="white">Fusion</text>
  <text x="1042" y="551" class="whiteSmall">PAN path</text>

  <path class="flowGreen" d="M1005 637 C1042 637,1079 608,1080 570"/>
  <path class="flowGreen" d="M1080 500 C1080 458,994 430,970 430"/>
  <path class="flowGreen" d="M840 430 C802 430,795 432,770 432"/>
  <path class="flowGreen" d="M840 430 C817 360,838 300,870 275"/>
  <path class="flowGreen" d="M840 240 C805 240,795 227,770 227"/>
  <path class="flowGreen" d="M970 240 C1015 250,1050 272,1080 290"/>
  <path class="flowGreen" d="M1080 360 C1080 415,1080 455,1080 500"/>

  <rect x="1198" y="185" width="120" height="82" rx="7" class="feature"/>
  <text x="1242" y="218" class="label">P3</text>
  <text x="1226" y="242" class="small">256 / 8</text>

  <rect x="1198" y="390" width="120" height="82" rx="7" class="feature"/>
  <text x="1242" y="423" class="label">P4</text>
  <text x="1220" y="447" class="small">256 / 16</text>

  <rect x="1198" y="595" width="120" height="82" rx="7" class="feature"/>
  <text x="1242" y="628" class="label">P5</text>
  <text x="1220" y="652" class="small">256 / 32</text>

  <path class="flowThin" d="M970 240 C1045 225,1120 225,1198 226"/>
  <path class="flowThin" d="M1145 325 C1186 342,1198 375,1198 431"/>
  <path class="flowThin" d="M1145 535 C1186 548,1198 586,1198 636"/>

  <rect x="1390" y="220" width="230" height="210" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1422" y="260" class="label">Uncertainty-minimal</text>
  <text x="1422" y="284" class="label">Query Selection</text>
  <rect x="1430" y="320" width="54" height="42" rx="5" class="query"/>
  <rect x="1498" y="320" width="54" height="42" rx="5" class="query"/>
  <rect x="1566" y="320" width="54" height="42" rx="5" class="query"/>
  <text x="1424" y="392" class="small">top 300 encoder features</text>
  <text x="1424" y="414" class="small">content queries + ref boxes</text>

  <path class="flow" d="M1318 226 C1358 226,1364 271,1390 292"/>
  <path class="flow" d="M1318 431 C1360 431,1368 357,1390 342"/>
  <path class="flow" d="M1318 636 C1360 636,1368 426,1390 384"/>

  <rect x="1405" y="570" width="250" height="165" rx="8" fill="url(#decoder)" filter="url(#shadow)"/>
  <text x="1450" y="614" class="white">Decoder &amp; Head</text>
  <text x="1444" y="640" class="whiteSmall">6 decoder layers</text>
  <text x="1444" y="662" class="whiteSmall">self-attn + MSDeformable cross-attn</text>
  <text x="1444" y="684" class="whiteSmall">class logits + boxes</text>
  <rect x="1442" y="705" width="54" height="28" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="1453" y="724" class="mono">cls</text>
  <rect x="1512" y="705" width="54" height="28" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="1522" y="724" class="mono">box</text>

  <path class="flow" d="M1505 430 C1505 486,1512 524,1518 570"/>

  <rect x="130" y="850" width="420" height="78" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="158" y="882" class="label">Training</text>
  <text x="158" y="906" class="small">Hungarian matching -> VFL + L1 bbox + GIoU loss</text>

  <rect x="610" y="850" width="420" height="78" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="638" y="882" class="label">Inference</text>
  <text x="638" y="906" class="small">RTDETRPostProcessor returns top detections; no NMS</text>

  <rect x="1090" y="850" width="420" height="78" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="1118" y="882" class="label">Config anchors</text>
  <text x="1118" y="906" class="small">hidden_dim 256, feature strides 8/16/32, num_queries 300</text>

  <path class="dash" d="M1478 735 C1400 805,760 800,550 850"/>
  <path class="dash" d="M1530 735 C1480 800,1140 810,1030 850"/>
</svg>
